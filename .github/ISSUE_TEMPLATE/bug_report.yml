name: Bug report
description: Report a reproducible Noctrail bug.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproduction you can.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Noctrail version or commit SHA.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux Wayland
        - Linux X11
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact secrets before pasting logs.
