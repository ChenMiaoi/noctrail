name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets --all-features

      - name: CLI doctor smoke
        run: cargo run -p noctrail-cli -- doctor

      - name: CLI shell doctor smoke
        run: cargo run -p noctrail-cli -- doctor shell

      - name: Render smoke
        run: cargo run -p noctrail-cli -- render-smoke

      - name: PTY smoke
        run: cargo run -p noctrail-cli -- pty-smoke

      - name: Replay smoke
        run: cargo run -p noctrail-cli -- replay "tests/fixtures/terminal/*.ntrec"

      - name: App smoke
        run: cargo run -p noctrail-app -- smoke
