name: Installer Smoke

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  installer:
    name: Installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Run macOS installer smoke
        if: runner.os == 'macOS'
        run: ./scripts/package-installer.sh

      - name: Skip Windows installer smoke in CI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Skipping Windows installer smoke in CI temporarily."
          Write-Host "The current MSI smoke path can hang indefinitely on"
          Write-Host "GitHub-hosted Windows runners and needs a separate fix."
