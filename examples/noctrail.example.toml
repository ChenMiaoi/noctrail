[renderer]
backend = "gpu"

[font]
family = "CaskaydiaMono NFM"
size = 15.0
fallback = ["Microsoft YaHei UI", "Segoe UI Emoji"]

[theme]
opacity = 1.0

[theme.color]
background = "#070d12"
foreground = "#e8eef2"
chrome-background = "#121a22"
chrome-foreground = "#f7fafc"
chrome-muted = "#97a5b2"
chrome-accent = "#7ad9b2"
chrome-danger = "#f28779"

[theme.border]
active = "#91b4ff"
inactive = "#313d49"
width = 1

[theme.pane]
gap = 12
padding = 8
radius = 18

[theme.blur]
enabled = true
fallback-tint-opacity = 0.94

[theme.animation]
enabled = true
duration-ms = 120

[theme.low-power]
enabled = false

[theme.cursor]
color = "#ffd885"
blink-interval-ms = 600

[theme.selection]
background = "#2d5a84d8"
foreground = "#ffffff"

[keymap]
copy = ["ctrl-shift-y", "ctrl-insert"]
paste = ["ctrl-shift-u", "shift-insert"]
command-palette = ["ctrl-shift-p"]
block-browser = ["ctrl-shift-b"]
patch-preview = ["ctrl-shift-d"]
review-panel = ["ctrl-shift-r"]
agent-context = ["ctrl-shift-a"]
agent-audit = ["ctrl-shift-l"]
focus-left = ["alt-a"]
focus-right = ["alt-d"]
focus-up = ["alt-w"]
focus-down = ["alt-s"]

[layout]
default-split-axis = "auto"
resize-step = 5
scratch-height-percent = 33
startup-workspace = 1

[agent]
enabled = false
read-env = false
read-history = false

[agent.provider]
type = "local"
model = "llama"
