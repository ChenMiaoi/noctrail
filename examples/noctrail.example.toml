[renderer]
backend = "gpu"

[font]
family = "CaskaydiaMono NFM"
size = 15.0
fallback = ["Microsoft YaHei UI", "Segoe UI Emoji"]

[theme]
opacity = 1.0

[theme.color]
background = "#0a1016"
foreground = "#e4ebf1"
chrome-background = "#131b23"
chrome-foreground = "#f3f7fb"
chrome-muted = "#8395a5"
chrome-accent = "#82c7ba"
chrome-danger = "#db8d80"

[theme.border]
active = "#8fb0d2"
inactive = "#243140"
width = 1

[theme.pane]
gap = 16
padding = 10
radius = 22

[theme.blur]
enabled = true
fallback-tint-opacity = 0.94

[theme.animation]
enabled = true
duration-ms = 96

[theme.low-power]
enabled = false

[theme.cursor]
color = "#f2d28c"
blink-interval-ms = 600

[theme.selection]
background = "#254a66d8"
foreground = "#ffffff"

[keymap]
copy = ["ctrl-shift-y", "ctrl-insert"]
paste = ["ctrl-shift-u", "shift-insert"]
command-palette = ["ctrl-shift-p"]
block-browser = ["ctrl-shift-b"]
patch-preview = ["ctrl-shift-d"]
review-panel = ["ctrl-shift-r"]
agent-context = ["ctrl-shift-a"]
agent-audit = ["ctrl-shift-l"]
focus-left = ["alt-a"]
focus-right = ["alt-d"]
focus-up = ["alt-w"]
focus-down = ["alt-s"]

[layout]
default-split-axis = "auto"
resize-step = 5
scratch-height-percent = 33
startup-workspace = 1

[agent]
enabled = false
read-env = false
read-history = false

[agent.provider]
type = "local"
model = "llama"
